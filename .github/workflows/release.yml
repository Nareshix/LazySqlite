name: Release LazySqlite

on:
  push:
    tags:
      - "v*.*.*"

# Needed to fix the 403 "Resource not accessible" error
permissions:
  contents: write

jobs:
  # Job 1: Create the GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # Sets the Title of the release to "LazySqlite v1.0.0"
          name: LazySqlite ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true

  # Job 2: Build and Upload Assets
  build-and-upload-assets:
    name: Build and Upload Assets
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --verbose --release --target ${{ matrix.target }}

      - name: Package binary for release
        id: package
        shell: bash
        run: |
          # The name of the binary file from your [[bin]] section in Cargo.toml
          BINARY_NAME="lazysqlite"

          # The directory where cargo built the binary
          TARGET_DIR="target/${{ matrix.target }}/release"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            SOURCE_FILE="${BINARY_NAME}.exe"
            ASSET_NAME="LazySqlite-${{ matrix.target }}.zip"
            # Enter target dir and zip from there to avoid including deep folders in the zip
            cd "$TARGET_DIR"
            7z a "../../../${ASSET_NAME}" "${SOURCE_FILE}"
            cd ../../../
          else
            SOURCE_FILE="${BINARY_NAME}"
            ASSET_NAME="LazySqlite-${{ matrix.target }}.tar.gz"
            # -C changes directory so the tar only contains the file, not the 'target/...' path
            tar -czvf "${ASSET_NAME}" -C "${TARGET_DIR}" "${SOURCE_FILE}"
          fi

          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset_name }}