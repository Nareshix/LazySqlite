name: LazySqlite

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false

  build-and-upload-assets:
    name: Build and Upload Assets
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name_suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name_suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name_suffix: .exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --verbose --release --target ${{ matrix.target }}

      # After building, we need to find the binary and package it.
      # We'll zip it for consistency across platforms.
      - name: Package binary for release
        shell: bash
        run: |
          # Define the binary path based on the OS
          BINARY_NAME="lazysqlite"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            SOURCE_PATH="target/${{ matrix.target }}/release/${BINARY_NAME}.exe"
            ASSET_NAME="${BINARY_NAME}-${{ matrix.target }}.zip"
            7z a $ASSET_NAME $SOURCE_PATH
          else
            SOURCE_PATH="target/${{ matrix.target }}/release/${BINARY_NAME}"
            ASSET_NAME="${BINARY_NAME}-${{ matrix.target }}.tar.gz"
            tar -czvf $ASSET_NAME $SOURCE_PATH
          fi
          # Set the asset name for the upload step
          echo "ASSET_NAME=${ASSET_NAME}" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.ASSET_NAME }}
          asset_name: ${{ env.ASSET_NAME }}
          asset_content_type: application/octet-stream